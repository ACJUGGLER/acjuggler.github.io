<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Calcular - Suelos Felices</title>
  <link rel="stylesheet" href="CSS/paginas.css" />
</head>
<body>
  <header>
    <nav>
      <ul class="nav_menu">
        <li><a href="index.html" class="nav_links">Inicio</a></li>
        <li><a href="que-hacemos.html" class="nav_links">Qué hacemos</a></li>
        <li><a href="calcular.html" class="nav_links">Calcular</a></li>
        <li><a href="sobre-nosotros.html" class="nav_links">Sobre nosotros</a></li>
      </ul>
    </nav>
  </header>

  <main class="calcular">
    <section class="hero">
      <h1>Calcula tus necesidades del suelo</h1>
      <p>Introduce los datos de tu terreno y obtén recomendaciones personalizadas de nutrientes y prácticas agrícolas.</p>
    </section>

    <section class="formulario">
      <form>
        <label>Tipo de cultivo:
          <input type="text" placeholder="Ej. Maíz" required />
        </label>
        <label>Área del terreno (ha):
          <input type="number" step="0.01" placeholder="Ej. 2.5" required />
        </label>
        <label>PH del suelo:
          <input type="number" step="0.1" min="0" max="14" required />
        </label>
        <label>Materia orgánica (%):
          <input type="number" step="0.1" required />
        </label>
        <button type="submit">Calcular</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2025 AgroInteligente. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
